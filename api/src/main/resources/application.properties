spring.application.name=api
server.port=${PORT:8080}

# Configuracoes de conexao com o PostgreSQL
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ignitionmotors}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuracoes do Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Token JWT
api.security.token.secret=${JWT_SECRET:minha-chave-secreta-e-super-segura-do-ignition-motors}

# Frontends liberados para acessar a API
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}
